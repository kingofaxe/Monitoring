# snmp.yml — compatible dengan prom/snmp-exporter:latest
# Format baru menggunakan "auths" dan "modules" sebagai top-level key

auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    auth_protocol: MD5
    priv_protocol: DES
    version: 2

modules:

  # ── MikroTik ──────────────────────────────────
  mikrotik:
    walk:
      - 1.3.6.1.2.1.1       # system info
      - 1.3.6.1.2.1.2       # interfaces
      - 1.3.6.1.2.1.31      # ifXTable
      - 1.3.6.1.4.1.14988.1 # MikroTik OID
    get:
      - 1.3.6.1.2.1.1.3.0   # sysUpTime
      - 1.3.6.1.2.1.1.5.0   # sysName
    auth: public_v2
    metrics:
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3.0
        type: gauge
        help: "Uptime perangkat dalam centiseconds"
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: "Status interface: 1=up 2=down"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: "Total bytes masuk per interface"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: "Total bytes keluar per interface"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

  # ── Unifi / generic if_mib ─────────────────────
  if_mib:
    walk:
      - 1.3.6.1.2.1.1       # system info
      - 1.3.6.1.2.1.2       # interfaces
      - 1.3.6.1.2.1.31      # ifXTable
    get:
      - 1.3.6.1.2.1.1.3.0   # sysUpTime
      - 1.3.6.1.2.1.1.5.0   # sysName
    auth: public_v2
    metrics:
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3.0
        type: gauge
        help: "Uptime perangkat dalam centiseconds"
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: "Status interface: 1=up 2=down"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: "Total bytes masuk per interface"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: "Total bytes keluar per interface"
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
