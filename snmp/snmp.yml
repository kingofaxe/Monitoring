# snmp.yml — format untuk prom/snmp-exporter:v0.21.0
# compatible dengan format lama (tanpa modules wrapper)

mikrotik:
  walk:
    - 1.3.6.1.2.1.1          # system
    - 1.3.6.1.2.1.2          # interfaces
    - 1.3.6.1.2.1.25.2       # hrStorage
    - 1.3.6.1.2.1.25.3       # hrDevice
    - 1.3.6.1.2.1.31         # ifXTable
    - 1.3.6.1.4.1.14988.1    # MikroTik
  auth:
    community: public
  version: 2
  metrics:
    - name: sysUpTime
      oid: 1.3.6.1.2.1.1.3.0
      type: gauge
      help: Uptime dalam centiseconds
    - name: sysDescr
      oid: 1.3.6.1.2.1.1.1.0
      type: DisplayString
      help: System description
    - name: ifOperStatus
      oid: 1.3.6.1.2.1.2.2.1.8
      type: gauge
      help: Status interface
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: ifHCInOctets
      oid: 1.3.6.1.2.1.31.1.1.1.6
      type: counter
      help: Bytes masuk per interface
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: ifHCOutOctets
      oid: 1.3.6.1.2.1.31.1.1.1.10
      type: counter
      help: Bytes keluar per interface
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: ifSpeed
      oid: 1.3.6.1.2.1.2.2.1.5
      type: gauge
      help: Interface speed
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: ifMtu
      oid: 1.3.6.1.2.1.2.2.1.4
      type: gauge
      help: Interface MTU
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: ifPhysAddress
      oid: 1.3.6.1.2.1.2.2.1.6
      type: PhysAddress48
      help: MAC address interface
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: ifAlias
      oid: 1.3.6.1.2.1.31.1.1.1.18
      type: DisplayString
      help: Interface alias
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: hrProcessorLoad
      oid: 1.3.6.1.2.1.25.3.3.1.2
      type: gauge
      help: CPU load per processor
      indexes:
        - labelname: hrDeviceIndex
          type: gauge
    - name: hrStorageSize
      oid: 1.3.6.1.2.1.25.2.3.1.5
      type: gauge
      help: Storage size
      indexes:
        - labelname: hrStorageIndex
          type: gauge
    - name: hrStorageUsed
      oid: 1.3.6.1.2.1.25.2.3.1.6
      type: gauge
      help: Storage used
      indexes:
        - labelname: hrStorageIndex
          type: gauge
    - name: hrDeviceStatus
      oid: 1.3.6.1.2.1.25.3.2.1.5
      type: gauge
      help: Device status
      indexes:
        - labelname: hrDeviceIndex
          type: gauge
    - name: hrDeviceErrors
      oid: 1.3.6.1.2.1.25.3.2.1.6
      type: counter
      help: Device errors
      indexes:
        - labelname: hrDeviceIndex
          type: gauge
    - name: mtxrBoardName
      oid: 1.3.6.1.4.1.14988.1.1.7.8.0
      type: DisplayString
      help: MikroTik board name
    - name: mtxrFirmwareVersion
      oid: 1.3.6.1.4.1.14988.1.1.7.4.0
      type: DisplayString
      help: MikroTik firmware version
    - name: mtxrSerialNumber
      oid: 1.3.6.1.4.1.14988.1.1.7.3.0
      type: DisplayString
      help: MikroTik serial number
    - name: mtxrLicVersion
      oid: 1.3.6.1.4.1.14988.1.1.9.1.0
      type: DisplayString
      help: MikroTik license version
    - name: mtxrLicLevel
      oid: 1.3.6.1.4.1.14988.1.1.9.2.0
      type: gauge
      help: MikroTik license level
    - name: mtxrHlTemperature
      oid: 1.3.6.1.4.1.14988.1.1.3.10.0
      type: gauge
      help: MikroTik temperature
    - name: mtxrHlVoltage
      oid: 1.3.6.1.4.1.14988.1.1.3.8.0
      type: gauge
      help: MikroTik voltage
    - name: mtxrHlActiveFan
      oid: 1.3.6.1.4.1.14988.1.1.3.9.0
      type: gauge
      help: MikroTik active fan
    - name: mtxrHlProcessorTemperature
      oid: 1.3.6.1.4.1.14988.1.1.3.11.0
      type: gauge
      help: MikroTik processor temperature
    - name: mtxrHlProcessorFrequency
      oid: 1.3.6.1.4.1.14988.1.1.3.14.0
      type: gauge
      help: MikroTik processor frequency
    - name: mtxrInterfaceStatsRxBytes
      oid: 1.3.6.1.4.1.14988.1.1.14.1.1.2
      type: counter
      help: MikroTik RX bytes per interface
      indexes:
        - labelname: mtxrInterfaceStatsIndex
          type: gauge
      lookups:
        - labels: [mtxrInterfaceStatsIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString
    - name: mtxrInterfaceStatsTxBytes
      oid: 1.3.6.1.4.1.14988.1.1.14.1.1.3
      type: counter
      help: MikroTik TX bytes per interface
      indexes:
        - labelname: mtxrInterfaceStatsIndex
          type: gauge
      lookups:
        - labels: [mtxrInterfaceStatsIndex]
          labelname: ifName
          oid: 1.3.6.1.2.1.31.1.1.1.1
          type: DisplayString

if_mib:
  walk:
    - 1.3.6.1.2.1.1
    - 1.3.6.1.2.1.2
    - 1.3.6.1.2.1.31
  auth:
    community: public
  version: 2
  metrics:
    - name: sysUpTime
      oid: 1.3.6.1.2.1.1.3.0
      type: gauge
      help: Uptime dalam centiseconds
    - name: ifOperStatus
      oid: 1.3.6.1.2.1.2.2.1.8
      type: gauge
      help: Status interface
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifDescr
          oid: 1.3.6.1.2.1.2.2.1.2
          type: DisplayString
    - name: ifHCInOctets
      oid: 1.3.6.1.2.1.31.1.1.1.6
      type: counter
      help: Bytes masuk
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifDescr
          oid: 1.3.6.1.2.1.2.2.1.2
          type: DisplayString
    - name: ifHCOutOctets
      oid: 1.3.6.1.2.1.31.1.1.1.10
      type: counter
      help: Bytes keluar
      indexes:
        - labelname: ifIndex
          type: gauge
      lookups:
        - labels: [ifIndex]
          labelname: ifDescr
          oid: 1.3.6.1.2.1.2.2.1.2
          type: DisplayString
