groups:
  - name: homeserver_alerts
    rules:

      - alert: HostDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} tidak bisa dimonitor"

      - alert: HighCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU tinggi di {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"

      - alert: HighMemory
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM hampir habis di {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"

      - alert: DiskAlmostFull
        expr: (node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} - node_filesystem_free_bytes{fstype!~"tmpfs|overlay"}) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk hampir penuh di {{ $labels.instance }} — {{ $labels.mountpoint }}: {{ $value | printf \"%.1f\" }}%"
