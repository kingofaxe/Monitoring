# ╔══════════════════════════════════════════════════════╗
# ║  MONITORING STACK                                   ║
# ║  Lokasi: /opt/web/monitoring/                       ║
# ║                                                     ║
# ║  1. Edit file .env → isi IP & password              ║
# ║  2. docker compose up -d                            ║
# ║  3. Akses: http://IP_SERVER:8099                    ║
# ╚══════════════════════════════════════════════════════╝

networks:
  monitoring:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  uptime_kuma_data:

services:

  # ─────────────────────────────────────────────
  # NGINX — Reverse proxy, akses semua via :8099
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: monitoring-nginx
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8099:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - grafana
      - prometheus
      - uptime-kuma

  # ─────────────────────────────────────────────
  # GRAFANA — Dashboard & grafik
  # Via Nginx:  http://IP_SERVER:8099/
  # Direct:    http://IP_SERVER:3000
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # PROMETHEUS — Metrics collector
  # Via Nginx:  http://IP_SERVER:8099/prometheus/
  # Direct:    http://IP_SERVER:9090
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # UPTIME KUMA — Status & alert
  # Via Nginx:  http://IP_SERVER:8099/status/
  # Direct:    http://IP_SERVER:3001
  # ─────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

  # ─────────────────────────────────────────────
  # CADVISOR — Monitor semua Docker container
  # Internal only, diakses Prometheus
  # ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

  # ─────────────────────────────────────────────
  # NODE EXPORTER — Monitor resource VM Docker
  # Internal only, diakses Prometheus
  # ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # ─────────────────────────────────────────────
  # SNMP EXPORTER — Monitor MikroTik & Unifi
  # Internal only, diakses Prometheus
  # ─────────────────────────────────────────────
  snmp-exporter:
    # v0.24.1 = versi terakhir yang support format snmp.yml lama
    # Jangan upgrade ke latest karena format config berubah total
    image: prom/snmp-exporter:v0.24.1
    container_name: snmp-exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9116:9116"
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
