networks:
  monitoring:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  uptime_kuma_data:

services:

  # ─────────────────────────────────────────────
  # NGINX — Reverse proxy, semua akses via :8099
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: monitoring-nginx
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8099:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - grafana
      - prometheus

  # ─────────────────────────────────────────────
  # GRAFANA — Dashboard & grafik
  # Akses: http://IP:8099/
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.domain-kamu.com

  # ─────────────────────────────────────────────
  # PROMETHEUS — Metrics collector
  # Akses langsung: http://IP:9090
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ─────────────────────────────────────────────
  # UPTIME KUMA — Status & alert
  # Akses langsung: http://IP:3001
  # Tidak lewat nginx karena tidak support sub-path
  # ─────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

  # ─────────────────────────────────────────────
  # CADVISOR — Monitor semua Docker container
  # Port 8081 (karena 8080 sudah dipakai)
  # ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

  # ─────────────────────────────────────────────
  # NODE EXPORTER — Monitor resource VM Docker
  # ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # ─────────────────────────────────────────────
  # SNMP EXPORTER — Monitor MikroTik & Unifi
  # Pakai latest agar format snmp.yml support
  # ─────────────────────────────────────────────
  snmp-exporter:
    image: prom/snmp-exporter:v0.24.1
    container_name: snmp-exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9116:9116"
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
