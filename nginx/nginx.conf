upstream grafana {
    server grafana:3000;
}

server {
    listen 80;
    server_name _;

    # ── Grafana — root / ─────────────────────────────
    # Akses: http://IP:8099/
    location / {
        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Grafana Live)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── CATATAN ──────────────────────────────────────────
# Prometheus → akses langsung http://IP:9090
# Uptime Kuma → akses langsung http://IP:3001
# Keduanya tidak lewat nginx karena:
# - Prometheus: conflict dengan sub-path routing
# - Uptime Kuma: tidak support sub-path
